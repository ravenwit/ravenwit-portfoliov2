<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacetime Portfolio | Topological Phase Transition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            transition: opacity 0.8s ease-in-out;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #ui-loader { opacity: 1; }
        .data-readout {
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.6);
            padding: 1rem; border-left: 2px solid cyan;
            backdrop-filter: blur(4px); margin-top: 20px;
        }

        #ui-hero { opacity: 0; pointer-events: none; }
        .hero-title {
            font-size: 4rem; font-weight: 100; letter-spacing: 0.5rem;
            color: transparent; -webkit-text-stroke: 1px cyan;
            text-shadow: 0 0 20px rgba(0,255,255,0.5);
            text-align: center;
        }
        .hero-prompt {
            margin-top: 2rem; font-size: 1rem; color: #fff;
            animation: blink 1s infinite;
        }

        #ui-timeline { opacity: 0; justify-content: flex-end; align-items: flex-start; padding: 30px; }
        #hud-panel {
            background: rgba(0, 10, 20, 0.5); padding: 15px;
            border-left: 2px solid #0ff; backdrop-filter: blur(4px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
            margin-bottom: 20px; pointer-events: auto;
        }
        .metric-row { display: flex; justify-content: space-between; width: 240px; margin-bottom: 6px; }
        .metric-label { color: #5588aa; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;}
        .metric-value { font-weight: bold; color: #ccffff; }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.3) 3px);
            pointer-events: none; z-index: 50; opacity: 0.15;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 40%, #000 150%);
            pointer-events: none; z-index: 51;
        }
        
        #labels-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20;
        }

        .node-container {
            position: absolute; transform: translate(-50%, -50%);
            display: flex; align-items: center; pointer-events: auto; 
            cursor: crosshair; transition: opacity 0.3s, transform 0.3s;
        }
        .node-anchor { 
            width: 12px; height: 12px; border: 2px solid #0ff; border-radius: 50%; 
            background: rgba(0,0,0,0.5); box-shadow: 0 0 10px #0ff; flex-shrink: 0;
        }
        .node-connector { 
            width: 40px; height: 2px; background: linear-gradient(90deg, #0ff, transparent); flex-shrink: 0;
        }
        
        .hud-card {
            background: rgba(10, 15, 20, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 15px;
            min-width: 240px;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }
        
        .hud-card.minimized {
            opacity: 0.6;
            filter: grayscale(0.5) blur(0.5px);
        }

        .hud-card.expanded {
            transform: scale(1.1);
            background: rgba(10, 20, 30, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            z-index: 1000;
        }
        
        .hud-card .details { 
            display: none; 
            border-top: 1px dashed rgba(0,255,255,0.2); 
            padding-top: 10px; 
            margin-top: 10px;
        }
        .hud-card.expanded .details { display: block; }
        
        .skill-tag {
            font-size: 9px; 
            background: rgba(0,255,255,0.1); 
            padding: 2px 5px; 
            border: 1px solid rgba(0,255,255,0.3);
            margin-right: 5px;
            margin-bottom: 5px;
            display: inline-block;
        }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div id="canvas-container"></div>
    <div id="labels-container"></div>

    <div id="ui-loader" class="ui-layer">
        <div class="text-center space-y-4">
            <h1 class="text-2xl font-light tracking-widest uppercase mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-purple-400">System Initialization</h1>
            <div class="w-64 h-1 bg-gray-900 rounded overflow-hidden relative mx-auto border border-gray-800">
                <div id="progress-bar" class="absolute top-0 left-0 h-full bg-gradient-to-r from-cyan-500 to-purple-500" style="width: 0%"></div>
            </div>
            <div class="data-readout text-xs text-cyan-100 opacity-90 text-left">
                <div>k_B T (Temp): <span id="temp-display">50.000</span></div>
                <div>Ω (Order): <span id="order-display">0.000</span></div>
                <div>Status: <span id="status-display">ENTROPY_MAXIMIZED</span></div>
            </div>
        </div>
    </div>

    <div id="ui-hero" class="ui-layer">
        <h1 class="hero-title">SPACETIME<br>ARCHITECT</h1>
        <div class="hero-prompt">> SCROLL TO INITIATE TRAJECTORY <</div>
    </div>

    <div id="ui-timeline" class="ui-layer">
        <div id="hud-panel">
            <div class="metric-row"><span class="metric-label">COORD. TIME (t)</span> <span id="coord-time" class="metric-value">0.00</span></div>
            <div class="metric-row"><span class="metric-label">PROPER TIME (&tau;)</span> <span id="proper-time" class="metric-value">0.00</span></div>
            <div class="metric-row"><span class="metric-label">VELOCITY (v)</span> <span id="velocity" class="metric-value">0.00c</span></div>
            <div class="metric-row"><span class="metric-label">LORENTZ (&gamma;)</span> <span id="lorentz" class="metric-value">1.000</span></div>
            <div style="margin-top:10px; font-size: 10px; opacity: 0.7; color: #0ff;">SYSTEM: OPTICAL LENSING ACTIVE</div>
        </div>
    </div>

    <!-- SHADERS -->
    <script type="x-shader/x-vertex" id="vertexParticle">
        uniform float uTime;
        uniform float uNoiseTime;
        uniform float uTemperature;
        uniform float uStretch;
        attribute float aRandom;
        attribute vec3 aLatticePos;
        varying float vAlpha;
        varying vec3 vColor;

        vec3 getChaoticNoise(float time, float seed) {
            float t = time;
            float x = sin(t + seed * 100.0) + cos(t * 0.4 + seed * 43.0) * 1.5;
            float y = cos(t + seed * 76.0) + sin(t * 0.6 + seed * 21.0) * 1.5;
            float z = sin(t * 0.8 + seed * 123.0) + cos(t * 0.3 + seed * 99.0);
            return vec3(x, y, z);
        }

        vec3 palette(float t) {
            vec3 a = vec3(0.5, 0.5, 0.5);
            vec3 b = vec3(0.5, 0.5, 0.5);
            vec3 c = vec3(1.0, 1.0, 1.0);
            vec3 d = vec3(0.263, 0.416, 0.557);
            return a + b * cos(6.28318 * (c * t + d));
        }

        void main() {
            vec3 targetPos = aLatticePos;
            vec3 noise = getChaoticNoise(uNoiseTime, aRandom);
            vec3 brownianTerm = noise * uTemperature;
            float dist = length(targetPos);
            float swirlAngle = uNoiseTime * 0.2 + dist * 0.05;
            float c = cos(swirlAngle); float s = sin(swirlAngle);
            mat2 rot = mat2(c, -s, s, c);
            if (uTemperature > 1.0) brownianTerm.xy = rot * brownianTerm.xy;
            vec3 pos = targetPos + brownianTerm;
            pos.z += pos.z * uStretch * 2.0; 
            pos.z += uStretch * (aRandom * 100.0); 
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            float tempSize = clamp(uTemperature, 0.0, 20.0);
            float warpThinning = 1.0 / (1.0 + uStretch * 5.0);
            gl_PointSize = (2.0 + tempSize * 0.2) * (150.0 / -mvPosition.z) * warpThinning;
            float disorder = clamp(uTemperature / 15.0, 0.0, 1.0);
            vec3 nebulaColor = palette(length(pos) * 0.02 - uTime * 0.2 + aRandom);
            nebulaColor = mix(nebulaColor, vec3(1.0, 0.2, 0.8), 0.3);
            vec3 crystalColor = vec3(0.1, 0.9, 1.0);
            vColor = mix(crystalColor, nebulaColor, disorder);
            float twinkle = sin(uTime * 1.5 + aRandom * 100.0) * 0.5 + 0.5;
            float baseAlpha = mix(0.8, 0.25 + twinkle * 0.3, disorder);
            vAlpha = baseAlpha * (1.0 - smoothstep(0.0, 15.0, uStretch));
        }
    </script>

    <script type="x-shader/x-fragment" id="fragmentParticle">
        varying float vAlpha;
        varying vec3 vColor;
        void main() {
            vec2 center = gl_PointCoord - 0.5;
            float dist = length(center);
            if (dist > 0.5) discard;
            float glow = exp(-dist * 8.0); 
            float core = 1.0 - smoothstep(0.0, 0.5, dist);
            gl_FragColor = vec4(vColor, vAlpha * (core * 0.6 + glow * 1.2));
        }
    </script>

    <script type="x-shader/x-vertex" id="vertexGrid">
        uniform float uTime;
        uniform vec3 uMassPositions[4]; 
        uniform float uMassStrengths[4];
        uniform float uOpacity; 
        attribute vec3 basePos;
        varying float vDistortion;
        void main() {
            vec3 pos = basePos;
            float totalDisplacement = 0.0;
            for(int i = 0; i < 4; i++) {
                float dx = pos.x - uMassPositions[i].x;
                float dz = pos.z - uMassPositions[i].z;
                float distSq = dx*dx + dz*dz;
                float decay = 0.4 / (uMassStrengths[i] + 10.0);
                decay = clamp(decay, 0.002, 0.02);
                float force = uMassStrengths[i] * exp(-distSq * decay);
                totalDisplacement -= force;
            }
            pos.y += totalDisplacement;
            vDistortion = totalDisplacement;
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = 2.0 * (100.0 / -mvPosition.z);
        }
    </script>

    <script type="x-shader/x-fragment" id="fragmentGrid">
        varying float vDistortion;
        uniform float uOpacity;
        void main() {
            vec3 color = vec3(0.1, 0.3, 0.4);
            float shift = smoothstep(-2.0, -25.0, vDistortion);
            color = mix(color, vec3(0.8, 0.3, 0.2), shift); 
            vec2 coord = gl_PointCoord - vec2(0.5);
            if(abs(coord.x) > 0.45 || abs(coord.y) > 0.45) discard;
            gl_FragColor = vec4(color, uOpacity * 0.6);
        }
    </script>

    <script>
        // --- DATA ---
        const CONFIG = {
            starCount: 15000,
            particleCount: 40000,
            gridZStart: 100, gridZEnd: -800, gridWidth: 400, gridDensity: 0.8,
            scrollDamping: 0.06,
            coolingRate: 0.96,
            minTemp: 0.005
        };

        const CAREER_NODES = [
            { x: 25, y: 0, z: -50, mass: 2.5, title: "ACADEMIC RESEARCH", subtitle: "Quantum Optics", responsibilities: ["SIMULATING PHOTON ENTANGLEMENT","OPTIMIZING LASER ARRAYS"], skills: ["MATLAB", "Lasers"] },
            { x: -30, y: 0, z: -160, mass: 4.0, title: "CERN FELLOWSHIP", subtitle: "Particle Tracking", responsibilities: ["ANALYZING COLLIDER EVENTS","GRID COMPUTING MANAGEMENT"], skills: ["C++", "ROOT", "Linux"] },
            { x: 20, y: 0, z: -280, mass: 6.0, title: "MASTER'S THESIS", subtitle: "Spacetime Topology", responsibilities: ["FIELD EQUATION DERIVATION","MANIFOLD VISUALIZATION"], skills: ["Python", "Geometry", "LaTeX"] },
            { x: -15, y: 0, z: -420, mass: 3.0, title: "FULL STACK ENG", subtitle: "WebGL Systems", responsibilities: ["IMMERSIVE UI ARCHITECTURE","SHADER OPTIMIZATION"], skills: ["React", "Three.js", "WebGL"] }
        ];

        const STATE = {
            phase: 'LOADING',
            temperature: 50.0,
            loadProgress: 0,
            scrollY: 0,
            targetScrollY: 0,
            warpFactor: 0,
            heroStartTime: 0,
            transitioning: false
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.0015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 90);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // TORUS
        const torusGeo = new THREE.BufferGeometry();
        const positions = []; const randoms = [];
        const R = 35; const r = 12;
        for(let i=0; i<CONFIG.particleCount; i++) {
            const u = Math.random() * Math.PI * 2;
            const v = Math.random() * Math.PI * 2;
            positions.push((R + r * Math.cos(v)) * Math.cos(u), (R + r * Math.cos(v)) * Math.sin(u), r * Math.sin(v));
            randoms.push(Math.random());
        }
        torusGeo.setAttribute('aLatticePos', new THREE.Float32BufferAttribute(positions, 3));
        torusGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        torusGeo.setAttribute('aRandom', new THREE.Float32BufferAttribute(randoms, 1));
        const torusMat = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 }, uNoiseTime: { value: 0 }, uTemperature: { value: 50.0 }, uStretch: { value: 0.0 } },
            vertexShader: document.getElementById('vertexParticle').textContent,
            fragmentShader: document.getElementById('fragmentParticle').textContent,
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });
        const torusMesh = new THREE.Points(torusGeo, torusMat);
        scene.add(torusMesh);

        // GRID
        const gridGeo = new THREE.BufferGeometry();
        const gridPoints = [];
        for(let z = CONFIG.gridZStart; z > CONFIG.gridZEnd; z -= CONFIG.gridDensity) {
            for(let x = -CONFIG.gridWidth/2; x < CONFIG.gridWidth/2; x += CONFIG.gridDensity) {
                gridPoints.push(x, 0, z);
            }
        }
        gridGeo.setAttribute('basePos', new THREE.Float32BufferAttribute(gridPoints, 3));
        gridGeo.setAttribute('position', new THREE.Float32BufferAttribute(gridPoints, 3));
        const gridMat = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexGrid').textContent,
            fragmentShader: document.getElementById('fragmentGrid').textContent,
            uniforms: { 
                uTime: { value: 0 },
                uMassPositions: { value: [new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()] }, 
                uMassStrengths: { value: [0,0,0,0] }, 
                uOpacity: { value: 0.0 } 
            },
            transparent: true, depthWrite: false, blending: THREE.NormalBlending
        });
        const gridMesh = new THREE.Points(gridGeo, gridMat);
        scene.add(gridMesh);

        // STARS
        const starsGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<CONFIG.starCount; i++) starPos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1200 - 200);
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, transparent: true, opacity: 0 });
        const starMesh = new THREE.Points(starsGeo, starsMat);
        scene.add(starMesh);

        // NODES & CARDS
        const nodesDOM = [];
        CAREER_NODES.forEach((node, i) => {
            gridMat.uniforms.uMassPositions.value[i] = new THREE.Vector3(node.x, 0, node.z);
            gridMat.uniforms.uMassStrengths.value[i] = node.mass * 15.0;
            
            const el = document.createElement('div');
            el.className = 'node-container'; 
            el.style.opacity = '0';
            el.innerHTML = `
                <div class="node-anchor"></div>
                <div class="node-connector"></div>
                <div class="hud-card minimized" id="card-${i}">
                    <div style="font-size: 10px; color: #5588aa; margin-bottom: 5px; letter-spacing: 1px;">EVENT_RECORD_${i+1}</div>
                    <div style="font-weight: bold; font-size: 16px; margin-bottom: 5px; color: #ccffff; letter-spacing: 1px;">${node.title}</div>
                    <div style="font-size: 12px; margin-bottom: 10px; color: #88ccdd;">${node.subtitle}</div>
                    <div class="details">
                        <div style="font-size: 11px; color: #00ffff; margin-bottom: 8px; letter-spacing: 1px; font-weight:bold;">CORE RESPONSIBILITIES:</div>
                        ${node.responsibilities.map(r => `<div style="font-size: 10px; margin-bottom: 5px; opacity: 0.8; line-height:1.2;">• ${r}</div>`).join('')}
                        <div style="font-size: 11px; color: #00ffff; margin-top: 15px; margin-bottom: 8px; letter-spacing: 1px; font-weight:bold;">QUALIFICATIONS:</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 5px;">
                            ${node.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('labels-container').appendChild(el);
            nodesDOM.push({ el, pos: new THREE.Vector3(node.x, 0, node.z), data: node });
            
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const card = el.querySelector('.hud-card');
                const isExpanded = card.classList.contains('expanded');
                document.querySelectorAll('.hud-card').forEach(c => c.classList.remove('expanded'));
                if (!isExpanded) card.classList.add('expanded');
            });
        });

        // PATH
        const curvePoints = [
            new THREE.Vector3(0, 20, 150),
            new THREE.Vector3(0, 20, 100), 
            new THREE.Vector3(0, 20, 50)  
        ];
        CAREER_NODES.forEach((node, i) => {
            const midZ = (curvePoints[curvePoints.length-1].z + node.z) / 2;
            curvePoints.push(new THREE.Vector3((i % 2 === 0 ? 30 : -30), 20, midZ));
            curvePoints.push(new THREE.Vector3(node.x, 0, node.z));
        });
        curvePoints.push(new THREE.Vector3(0, 30, -600));
        const cameraPath = new THREE.CatmullRomCurve3(curvePoints);
        cameraPath.tension = 0.3;

        // INPUT
        window.addEventListener('wheel', (e) => {
            if (STATE.phase === 'HERO') {
                if (e.deltaY > 0) initiateTransition();
            } else if (STATE.phase === 'TIMELINE' && !STATE.transitioning) {
                if (STATE.scrollY < 5 && e.deltaY < -20) {
                    initiateBackToHero();
                } else {
                    STATE.targetScrollY += e.deltaY * 0.25;
                    STATE.targetScrollY = Math.max(0, Math.min(STATE.targetScrollY, 8000));
                }
            }
        });

        function initiateTransition() {
            if (STATE.phase !== 'HERO' || STATE.transitioning) return;
            STATE.phase = 'TRANSITION'; STATE.transitioning = true;
            document.getElementById('ui-hero').style.opacity = 0;
            const startTime = performance.now();
            const startCamPos = camera.position.clone();
            const endCamPos = cameraPath.getPointAt(0);
            const initialLookAt = cameraPath.getPointAt(0.01);

            const loop = (now) => {
                const t = Math.min((now - startTime) / 2000, 1); // Synced to 2000ms
                const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                
                torusMat.uniforms.uStretch.value = ease * 18.0;
                torusMat.uniforms.uTemperature.value = CONFIG.minTemp + (ease * 3.0);
                
                // Position Seeking
                camera.position.lerpVectors(startCamPos, endCamPos, ease);
                
                // DAMPED QUATERNION SEEKING (Matches Zoom Out feel)
                const dummy = camera.clone();
                dummy.position.copy(camera.position);
                // During the first half of transition, keep focus near origin for parallax
                const focusWeight = Math.pow(ease, 2);
                const currentFocus = new THREE.Vector3().lerpVectors(new THREE.Vector3(0,0,0), initialLookAt, focusWeight);
                dummy.lookAt(currentFocus);
                camera.quaternion.slerp(dummy.quaternion, 0.1);

                // Immediate Linear Crossfade
                gridMat.uniforms.uOpacity.value = ease;
                starsMat.opacity = ease;

                if (t < 1) requestAnimationFrame(loop);
                else { 
                    STATE.phase = 'TIMELINE'; 
                    STATE.transitioning = false; 
                    document.getElementById('ui-timeline').style.opacity = 1; 
                }
            };
            requestAnimationFrame(loop);
        }

        function initiateBackToHero() {
            if (STATE.phase !== 'TIMELINE' || STATE.transitioning) return;
            STATE.phase = 'TRANSITION'; STATE.transitioning = true;
            document.getElementById('ui-timeline').style.opacity = 0;
            const startTime = performance.now();
            const startCamPos = camera.position.clone();
            const endCamPos = new THREE.Vector3(0, 0, 50);

            const loop = (now) => {
                const t = Math.min((now - startTime) / 2000, 1);
                const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                const invEase = 1 - ease;
                
                torusMat.uniforms.uStretch.value = invEase * 18.0;
                camera.position.lerpVectors(startCamPos, endCamPos, ease);
                
                // DAMPED QUATERNION SEEKING
                const dummy = camera.clone();
                dummy.position.copy(camera.position);
                dummy.lookAt(0, 0, 0);
                camera.quaternion.slerp(dummy.quaternion, 0.1);

                gridMat.uniforms.uOpacity.value = invEase;
                starsMat.opacity = invEase;

                if (t < 1) requestAnimationFrame(loop);
                else { 
                    STATE.phase = 'HERO'; 
                    STATE.transitioning = false; 
                    document.getElementById('ui-hero').style.opacity = 1; 
                    STATE.targetScrollY = 0; 
                    STATE.scrollY = 0; 
                }
            };
            requestAnimationFrame(loop);
        }

        function smoothstep(min, max, value) { let x = Math.max(0, Math.min(1, (value-min)/(max-min))); return x*x*(3 - 2*x); }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta(); const time = clock.getElapsedTime();
            if (torusMat && torusMat.uniforms.uTime) torusMat.uniforms.uTime.value = time;
            
            if (STATE.phase === 'LOADING') {
                if (STATE.loadProgress < 100) { STATE.loadProgress += 0.5; STATE.temperature = 50.0 + Math.sin(time * 2.0) * 2.0; }
                document.getElementById('progress-bar').style.width = `${STATE.loadProgress}%`;
                if (STATE.loadProgress >= 100) {
                     if (STATE.temperature > CONFIG.minTemp) STATE.temperature *= CONFIG.coolingRate;
                     else { STATE.temperature = CONFIG.minTemp; STATE.phase = 'HERO'; document.getElementById('ui-loader').style.opacity = 0; setTimeout(() => document.getElementById('ui-hero').style.opacity = 1, 1000); TWEEN_Pos(camera.position, new THREE.Vector3(0, 0, 50), 2000); document.getElementById('status-display').innerText = "SYSTEM_READY"; }
                }
                torusMesh.rotation.z += 0.002;
            } else if (STATE.phase === 'HERO' && !STATE.transitioning) {
                torusMesh.rotation.z += 0.001;
                camera.position.x = Math.sin(time * 0.5) * 1.5; camera.position.y = Math.cos(time * 0.3) * 1.5;
                camera.lookAt(0, 0, 0);
            } else if (STATE.phase === 'TIMELINE' && !STATE.transitioning) {
                const diff = STATE.targetScrollY - STATE.scrollY;
                STATE.scrollY += diff * CONFIG.scrollDamping;
                const pathProgress = Math.min(Math.max(STATE.scrollY / 8000, 0), 1.0);
                const camPos = cameraPath.getPointAt(pathProgress);
                const lookPos = cameraPath.getPointAt(Math.min(pathProgress + 0.01, 1.0));
                camera.position.copy(camPos); camera.lookAt(lookPos);
                const xTurn = (lookPos.x - camPos.x);
                camera.rotation.z = THREE.MathUtils.lerp(camera.rotation.z, -xTurn * 0.5, 0.1);
                
                document.getElementById('velocity').innerText = (Math.abs(diff)/200).toFixed(3) + "c";
                document.getElementById('coord-time').innerText = time.toFixed(2);
                
                nodesDOM.forEach(n => {
                    const dist = camera.position.distanceTo(n.pos);
                    const screenPos = n.pos.clone().project(camera);
                    const x = (screenPos.x * .5 + .5) * window.innerWidth;
                    const y = -(screenPos.y * .5 - .5) * window.innerHeight;
                    const card = n.el.querySelector('.hud-card');

                    if ((n.pos.z - camera.position.z) > 10 || dist > 400) {
                        n.el.style.opacity = 0;
                        n.el.style.display = 'none';
                    } else {
                        n.el.style.display = 'flex';
                        if (dist < 120) {
                            card.classList.remove('minimized');
                            n.el.style.opacity = 1; 
                            n.el.style.zIndex = 100;
                            n.el.style.transform = `translate(${x}px, ${y}px) scale(1)`;
                        } else {
                            if (!card.classList.contains('expanded')) card.classList.add('minimized');
                            n.el.style.opacity = Math.max(0.2, 1.0 - ((dist - 120) / 280));
                            n.el.style.zIndex = 50; 
                            n.el.style.transform = `translate(${x}px, ${y}px) scale(0.8)`;
                        }

                        if (n.data.x < 0) {
                            n.el.style.flexDirection = "row-reverse";
                            n.el.querySelector('.node-connector').style.background = "linear-gradient(-90deg, #0ff, transparent)";
                            card.style.borderLeft = "none";
                            card.style.borderRight = "2px solid #0ff";
                        } else {
                            n.el.style.flexDirection = "row";
                            n.el.querySelector('.node-connector').style.background = "linear-gradient(90deg, #0ff, transparent)";
                            card.style.borderRight = "none";
                            card.style.borderLeft = "2px solid #0ff";
                        }
                    }
                });
            }
            
            if (torusMat) {
                torusMat.uniforms.uNoiseTime.value += dt * (0.1 + STATE.temperature * 0.05);
                torusMat.uniforms.uTemperature.value = STATE.temperature;
            }
            if (gridMat && gridMat.uniforms.uTime) gridMat.uniforms.uTime.value = time;
            renderer.render(scene, camera);
        }

        function TWEEN_Pos(vec3, target, duration) {
            const start = vec3.clone(); const startTime = performance.now();
            const loop = (now) => { 
                if (STATE.phase !== 'HERO' && STATE.phase !== 'LOADING') return;
                const t = Math.min((now - startTime) / duration, 1); 
                const ease = t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t; 
                vec3.lerpVectors(start, target, ease); 
                if (t < 1) requestAnimationFrame(loop); 
            };
            requestAnimationFrame(loop);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
