<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacetime Portfolio | State 2: Vortex Flight</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* --- HUD UI --- */
        #hud {
            position: fixed; bottom: 30px; left: 30px;
            color: rgba(0, 255, 255, 0.8); font-size: 13px;
            pointer-events: none; z-index: 10;
            background: rgba(0, 10, 20, 0.5); padding: 15px;
            border-left: 2px solid #0ff; backdrop-filter: blur(4px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .metric-row { display: flex; justify-content: space-between; width: 240px; margin-bottom: 6px; }
        .metric-label { color: #5588aa; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;}
        .metric-value { font-weight: bold; color: #ccffff; }

        /* --- POST FX OVERLAYS --- */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.3) 3px);
            pointer-events: none; z-index: 5; opacity: 0.2;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 40%, #000 150%);
            pointer-events: none; z-index: 6;
        }
        
        /* --- 3D LABELS CONTAINER --- */
        #labels-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 8;
        }

        /* --- DYNAMIC HUD CARD DESIGN --- */
        .node-container {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex; align-items: center;
            transition: opacity 0.3s ease-out, transform 0.3s ease-out; 
            will-change: transform, opacity;
            pointer-events: auto; 
            cursor: crosshair;
        }

        .node-anchor {
            width: 12px; height: 12px;
            border: 2px solid #0ff; border-radius: 50%;
            background: rgba(0,0,0,0.5); box-shadow: 0 0 10px #0ff;
            flex-shrink: 0;
        }
        
        .node-connector {
            width: 40px; height: 2px;
            background: linear-gradient(90deg, #0ff, transparent);
            transition: width 0.4s ease; 
        }

        .hud-card {
            background: rgba(10, 15, 20, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-left: 2px solid #0ff;
            padding: 0;
            min-width: 240px; 
            color: #fff; font-family: 'Courier New', monospace;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative; overflow: hidden;
            cursor: crosshair;
            
            transition: 
                min-width 0.4s cubic-bezier(0.22, 1, 0.36, 1), 
                opacity 0.3s ease,
                background-color 0.3s ease,
                border-color 0.3s ease,
                box-shadow 0.3s ease,
                transform 0.3s ease;
        }

        .node-container:hover .hud-card:not(.minimized) {
            background: rgba(15, 30, 45, 0.95);
            border-color: #00ffff;
            box-shadow: 0 0 20px 2px rgba(0, 255, 255, 0.6), inset 0 0 20px rgba(0, 255, 255, 0.2);
            transform: scale(1.05);
            z-index: 1000;
        }

        .node-container:hover .hud-card.minimized {
            background: rgba(10, 25, 40, 0.6);
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            transform: scale(0.95);
        }

        .hud-card.minimized {
            min-width: 80px; 
            background: rgba(0, 10, 20, 0.4); 
            border-color: rgba(0, 255, 255, 0.1);
            border-left: 2px solid rgba(0, 255, 255, 0.3);
            box-shadow: none;
            transform: scale(0.9);
        }

        .hud-card.minimized .card-body,
        .hud-card.minimized .card-footer,
        .hud-card.minimized .card-mass-bar,
        .hud-card.minimized .card-logs { 
            display: none; 
        }
        
        .hud-card.minimized .card-header {
            border-bottom: none;
            padding: 4px 8px;
            justify-content: center;
        }
        
        .hud-card.minimized .card-id {
            font-size: 10px; color: #0ff; opacity: 0.8;
            letter-spacing: 2px;
        }

        .card-header {
            background: rgba(0, 255, 255, 0.1);
            padding: 6px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
        }
        
        .card-id { font-size: 10px; color: #5588aa; letter-spacing: 1px; transition: all 0.3s; }

        .card-mass-bar {
            width: 60px; height: 4px;
            background: #334455; border-radius: 2px; overflow: hidden;
        }
        .card-mass-fill { height: 100%; background: #0ff; box-shadow: 0 0 5px #0ff; }

        .card-body { padding: 12px; padding-bottom: 8px; }

        .card-title {
            font-size: 14px; font-weight: bold; color: #fff;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 4px; text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }

        .card-subtitle { font-size: 11px; color: #88ccdd; margin-bottom: 0; }

        /* --- MISSION LOGS EXPANDER (UPDATED FOR MULTILINE) --- */
        .card-logs {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            border-top: 0 solid rgba(0, 255, 255, 0.0);
            transition: all 0.4s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .hud-card.expanded .card-logs {
            max-height: 150px; /* Allow growth */
            opacity: 1;
            border-top: 1px dashed rgba(0, 255, 255, 0.2);
            padding: 8px 12px;
        }

        .log-line {
            font-size: 10px;
            color: #0ff;
            font-family: 'Courier New', monospace;
            white-space: nowrap;
            display: flex;
            align-items: center;
            opacity: 0.9;
        }
        
        .log-prefix { margin-right: 8px; opacity: 0.5; font-size: 9px; }
        .log-cursor { animation: blink 1s infinite; margin-left: 2px; color: #0ff; display: inline-block; width: 6px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- FOOTER & EXPANDER BUTTON --- */
        .card-footer {
            padding: 8px 12px; border-top: 1px solid rgba(0, 255, 255, 0.1);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 10px; color: #667788;
        }

        .expander-btn {
            background: transparent;
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #0ff;
            font-size: 9px;
            padding: 2px 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
        }
        .expander-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 5px #0ff;
        }

        .hud-card::before {
            content: ''; position: absolute; top: 0; right: 0; width: 10px; height: 10px;
            border-top: 2px solid #0ff; border-right: 2px solid #0ff; opacity: 0.5;
        }
        .hud-card::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 10px; height: 10px;
            border-bottom: 2px solid #0ff; border-right: 2px solid #0ff; opacity: 0.5;
        }

        .velocity-warning {
            color: #ff0055; text-shadow: 0 0 8px #ff0000;
            display: none; font-weight: bold; margin-top: 5px; text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div id="hud">
        <div class="metric-row"><span class="metric-label">COORD. TIME (t)</span> <span id="coord-time" class="metric-value">0.00</span></div>
        <div class="metric-row"><span class="metric-label">PROPER TIME (&tau;)</span> <span id="proper-time" class="metric-value">0.00</span></div>
        <div class="metric-row"><span class="metric-label">VELOCITY (v)</span> <span id="velocity" class="metric-value">0.00c</span></div>
        <div class="metric-row"><span class="metric-label">LORENTZ (&gamma;)</span> <span id="lorentz" class="metric-value">1.000</span></div>
        <div id="warp-status" style="margin-top:10px; font-size: 10px; opacity: 0.7; color: #0ff;">OPTICS: LENSING ACTIVE</div>
        <div id="velocity-alert" class="velocity-warning">CAUSALITY BREAK IMMINENT</div>
    </div>
    
    <div id="labels-container"></div>

    <script>
        // --- CONFIGURATION ---
        const CONFIG = {
            c_sim: 120, 
            scrollDamping: 0.06, 
            starCount: 15000, 
            massStrength: 15.0, 
            lensingStrength: 120.0, 
            gridZStart: 100,
            gridZEnd: -800,
            gridWidth: 400, 
            gridDensity: 0.6 
        };

        // --- DATA ---
        const CAREER_NODES = [
            { 
                x: 25, y: 0, z: -50, mass: 1.5, 
                title: "ACADEMIC RESEARCH", subtitle: "Quantum Optics Systems", date: "2021-2022",
                skills: ["MATLAB", "Lasers", "Polarization"],
                responsibilities: [
                    "SIMULATING PHOTON ENTANGLEMENT",
                    "OPTIMIZING LASER ARRAYS",
                    "PUBLISHING RESEARCH DATA"
                ]
            },
            { 
                x: -30, y: 0, z: -160, mass: 3.25, 
                title: "CERN FELLOWSHIP", subtitle: "High Energy Particle Tracking", date: "2023",
                skills: ["C++", "ROOT", "Linux", "Data Analysis"],
                responsibilities: [
                    "ANALYZING COLLIDER EVENTS",
                    "MAINTAINING GRID CLUSTERS",
                    "DEVELOPING TRACKING ALGORITHMS"
                ]
            },
            { 
                x: 20, y: 0, z: -280, mass: 5.0, 
                title: "MASTER'S THESIS", subtitle: "Topological Defects in Spacetime", date: "2024",
                skills: ["Python", "Diff. Geometry", "LaTeX", "Topology"],
                responsibilities: [
                    "DERIVING FIELD EQUATIONS",
                    "VISUALIZING MANIFOLD TOPOLOGY",
                    "DEFENDING THESIS DISSERTATION"
                ]
            },
            { 
                x: -15, y: 0, z: -420, mass: 2.25, 
                title: "FULL STACK ENG", subtitle: "High-Performance WebGL Systems", date: "2025",
                skills: ["React", "Three.js", "WebGL", "Node.js"],
                responsibilities: [
                    "BUILDING IMMERSIVE UI",
                    "OPTIMIZING SHADER PIPELINES",
                    "DEPLOYING CLOUD INFRASTRUCTURE"
                ]
            }
        ];

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010103);
        scene.fog = new THREE.FogExp2(0x010103, 0.002); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- CAMERA PATH ---
        const curvePoints = [];
        curvePoints.push(new THREE.Vector3(0, 20, 100)); 
        CAREER_NODES.forEach((node, i) => {
            const prevZ = i === 0 ? 100 : CAREER_NODES[i-1].z;
            const midZ = (prevZ + node.z) / 2;
            const direction = (i % 2 === 0) ? 1 : -1;
            curvePoints.push(new THREE.Vector3(direction * 30, 20, midZ));
            curvePoints.push(new THREE.Vector3(node.x, 0, node.z));
        });
        curvePoints.push(new THREE.Vector3(0, 30, -600));
        const cameraPath = new THREE.CatmullRomCurve3(curvePoints);
        cameraPath.tension = 0.3; 


        // --- 1. THE SPACETIME MANIFOLD ---
        const gridVertexShader = `
            uniform float uTime;
            uniform vec3 uMassPositions[4]; 
            uniform float uMassStrengths[4];
            attribute vec3 basePos;
            varying float vDistortion;
            varying float vDepth;
            
            void main() {
                vec3 pos = basePos;
                float totalDisplacement = 0.0;
                
                for(int i = 0; i < 4; i++) {
                    float dx = pos.x - uMassPositions[i].x;
                    float dz = pos.z - uMassPositions[i].z;
                    float distSq = dx*dx + dz*dz;
                    float decay = 0.4 / (uMassStrengths[i] + 10.0);
                    decay = clamp(decay, 0.002, 0.02);
                    float force = uMassStrengths[i] * exp(-distSq * decay);
                    totalDisplacement -= force;
                }
                pos.y += totalDisplacement;

                vDistortion = totalDisplacement;
                vDepth = -pos.z; 
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                gl_PointSize = 2.0 * (100.0 / -mvPosition.z);
                gl_PointSize = clamp(gl_PointSize, 1.5, 3.5);
            }
        `;

        const gridFragmentShader = `
            varying float vDistortion;
            void main() {
                vec3 color = vec3(0.1, 0.3, 0.4);
                float shift = smoothstep(-2.0, -25.0, vDistortion);
                color = mix(color, vec3(0.8, 0.3, 0.2), shift); 
                float alpha = 0.5 + (shift * 0.5);
                vec2 coord = gl_PointCoord - vec2(0.5);
                if(abs(coord.x) > 0.45 || abs(coord.y) > 0.45) discard;
                gl_FragColor = vec4(color, alpha);
            }
        `;

        const gridGeo = new THREE.BufferGeometry();
        const gridPoints = [];
        for(let z = CONFIG.gridZStart; z > CONFIG.gridZEnd; z -= CONFIG.gridDensity) {
            for(let x = -CONFIG.gridWidth/2; x < CONFIG.gridWidth/2; x += CONFIG.gridDensity) {
                gridPoints.push(x, 0, z);
            }
        }
        gridGeo.setAttribute('basePos', new THREE.Float32BufferAttribute(gridPoints, 3));
        gridGeo.setAttribute('position', new THREE.Float32BufferAttribute(gridPoints, 3)); 

        const gridMat = new THREE.ShaderMaterial({
            vertexShader: gridVertexShader,
            fragmentShader: gridFragmentShader,
            uniforms: {
                uMassPositions: { value: [new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()] },
                uMassStrengths: { value: [0,0,0,0] }
            },
            transparent: true, depthWrite: false, blending: THREE.NormalBlending 
        });

        const gridMesh = new THREE.Points(gridGeo, gridMat);
        scene.add(gridMesh);


        // --- 2. THE EVENTS & SKILL ARTIFACTS ---
        
        function createIconTexture(skillName) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4; ctx.fillStyle = "#00ffff";
            ctx.shadowColor = "#00ffff"; ctx.shadowBlur = 15;
            const cx = 64; const cy = 64;
            const name = skillName.toLowerCase();
            
            if (name.includes("react")) {
                ctx.beginPath();
                ctx.ellipse(cx, cy, 20, 50, Math.PI/4, 0, Math.PI*2);
                ctx.ellipse(cx, cy, 20, 50, -Math.PI/4, 0, Math.PI*2);
                ctx.ellipse(cx, cy, 20, 50, 0, 0, Math.PI*2);
                ctx.stroke(); ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2); ctx.fill();
            } else if (name.includes("python")) {
                ctx.beginPath(); ctx.arc(cx, cy-15, 15, Math.PI, 0); ctx.lineTo(cx+15, cy+15);
                ctx.arc(cx, cy+15, 15, 0, Math.PI); ctx.lineTo(cx-15, cy-15); ctx.stroke();
                ctx.beginPath(); ctx.arc(cx-5, cy-25, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx+5, cy+25, 3, 0, Math.PI*2); ctx.fill();
            } else if (name.includes("c++")) {
                ctx.font = "bold 40px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("C++", cx, cy);
            } else if (name.includes("three") || name.includes("webgl")) {
                ctx.beginPath(); ctx.moveTo(cx, cy-40); ctx.lineTo(cx+35, cy+25); ctx.lineTo(cx-35, cy+25); ctx.closePath(); ctx.stroke();
                ctx.beginPath(); ctx.arc(cx, cy-40, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx+35, cy+25, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx-35, cy+25, 4, 0, Math.PI*2); ctx.fill();
            } else if (name.includes("linux") || name.includes("root")) {
                ctx.font = "bold 50px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(">_", cx, cy);
            } else if (name.includes("data") || name.includes("matlab")) {
                ctx.beginPath(); ctx.moveTo(cx-30, cy+30); ctx.lineTo(cx-30, cy-30); ctx.moveTo(cx-30, cy+30); ctx.lineTo(cx+30, cy+30); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx-30, cy+30); ctx.lineTo(cx-10, cy); ctx.lineTo(cx+10, cy+10); ctx.lineTo(cx+30, cy-20); ctx.stroke();
            } else if (name.includes("latex") || name.includes("geometry") || name.includes("topology")) {
                ctx.font = "italic bold 50px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                if(name.includes("topology")) ctx.fillText("T", cx, cy); else if (name.includes("geometry")) ctx.fillText("dx", cx, cy); else ctx.fillText("TeX", cx, cy);
            } else {
                ctx.strokeRect(20, 20, 88, 88); ctx.font = "bold 40px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(skillName.substring(0, 2).toUpperCase(), cx, cy);
            }
            const tex = new THREE.CanvasTexture(canvas); tex.minFilter = THREE.LinearFilter; return tex;
        }

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0.0, 'rgba(255, 255, 255, 1.0)');
            grad.addColorStop(0.3, 'rgba(100, 200, 255, 0.5)');
            grad.addColorStop(1.0, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }
        
        const glowTexture = createGlowTexture();
        const glowMaterial = new THREE.SpriteMaterial({ map: glowTexture, color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
        const skillCoreMat = new THREE.MeshBasicMaterial({ color: 0x001122, transparent: true, opacity: 0.9 });
        const skillShellMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.5 });
        const orbitLineMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.15 });

        const nodeGroup = new THREE.Group();
        scene.add(nodeGroup);

        // --- TYPING ANIMATION SYSTEM ---
        const typingState = {}; // Stores index and timer for each node

        CAREER_NODES.forEach((node, index) => {
            // Initialize Typing State for Multiline
            typingState[index] = { 
                lineIndex: 0, 
                charIndex: 0, 
                isTyping: false
            };

            if (index < 4) {
                gridMat.uniforms.uMassPositions.value[index] = new THREE.Vector3(node.x, 0, node.z);
                gridMat.uniforms.uMassStrengths.value[index] = node.mass * CONFIG.massStrength;
            }

            const wrapper = new THREE.Group();
            const totalDepth = node.mass * CONFIG.massStrength;
            wrapper.position.set(node.x, -totalDepth * 0.4, node.z); 

            // 1. Core Glow
            const scale = 12 + (node.mass * 1.5); 
            const sprite = new THREE.Sprite(glowMaterial);
            sprite.scale.set(scale, scale, 1);
            wrapper.add(sprite);
            
            const coreMat = new THREE.SpriteMaterial({ map: glowTexture, color: 0xffffff });
            const core = new THREE.Sprite(coreMat);
            core.scale.set(scale * 0.2, scale * 0.2, 1);
            wrapper.add(core);

            // 2. Accretion Dust
            const ringGeo = new THREE.BufferGeometry();
            const ringPos = [];
            for(let i=0; i<80; i++) {
                const theta = Math.random() * Math.PI * 2;
                const r = scale * 0.4 + Math.random() * (scale * 0.2);
                ringPos.push(r * Math.cos(theta), (Math.random()-0.5) * 2.0, r * Math.sin(theta));
            }
            ringGeo.setAttribute('position', new THREE.Float32BufferAttribute(ringPos, 3));
            const ringMat = new THREE.PointsMaterial({ color: 0xffcc88, size: 0.3, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
            const ring = new THREE.Points(ringGeo, ringMat);
            wrapper.add(ring);
            
            // 3. SKILL ARTIFACTS
            const skillShell = new THREE.Group();
            skillShell.position.y = 12; 
            const orbitRadius = 12; 
            const orbitCurve = new THREE.EllipseCurve(0, 0, orbitRadius, orbitRadius, 0, 2 * Math.PI, false, 0);
            const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitCurve.getPoints(64));
            orbitGeo.rotateX(-Math.PI / 2);
            skillShell.add(new THREE.Line(orbitGeo, orbitLineMat));

            if (node.skills && node.skills.length > 0) {
                const step = (Math.PI * 2) / node.skills.length;
                node.skills.forEach((skillName, sIndex) => {
                    const angle = step * sIndex;
                    const skillPivot = new THREE.Group();
                    skillPivot.position.set(Math.cos(angle) * orbitRadius, 0, Math.sin(angle) * orbitRadius);
                    skillPivot.add(new THREE.Mesh(new THREE.IcosahedronGeometry(1.5, 0), skillCoreMat));
                    skillPivot.add(new THREE.Mesh(new THREE.IcosahedronGeometry(2.5, 0), skillShellMat));
                    
                    const iconTex = createIconTexture(skillName);
                    const iconMat = new THREE.SpriteMaterial({ map: iconTex, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false });
                    const iconSprite = new THREE.Sprite(iconMat);
                    iconSprite.scale.set(2.0, 2.0, 1.0);
                    skillPivot.add(iconSprite);
                    
                    skillPivot.userData = { phase: Math.random() * Math.PI * 2, rotSpeed: (Math.random() * 0.02) + 0.01 };
                    skillShell.add(skillPivot);
                });
            }
            wrapper.add(skillShell);
            
            nodeGroup.add(wrapper);

            // --- HUD CARD ---
            const label = document.createElement('div');
            label.className = 'node-container';
            const massPct = Math.min((node.mass / 10) * 100, 100);
            label.innerHTML = `
                <div class="node-anchor"></div>
                <div class="node-connector"></div>
                <div class="hud-card minimized" id="card-${index}">
                    <div class="card-header"><span class="card-id">EVT-0${index + 1}</span><div class="card-mass-bar"><div class="card-mass-fill" style="width: ${massPct}%"></div></div></div>
                    <div class="card-body"><div class="card-title">${node.title}</div><div class="card-subtitle">${node.subtitle}</div></div>
                    
                    <!-- UPDATED: Mission Logs Section (Multiline Container) -->
                    <div class="card-logs" id="logs-container-${index}">
                        <!-- Content injected via JS -->
                    </div>

                    <div class="card-footer">
                        <span>G-POTENTIAL: ${node.mass.toFixed(2)}</span>
                        <!-- NEW: Expander Button -->
                        <button class="expander-btn" id="btn-${index}">[ + ]</button>
                    </div>
                </div>
            `;
            
            // Interaction: Expand Toggle (Click on whole card)
            const cardElement = label.querySelector(`#card-${index}`);
            cardElement.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent bubbling issues
                toggleCardExpansion(index);
            });

            // Interaction: Hover Focus
            label.addEventListener('mouseenter', () => { isHoveringNode = true; });
            label.addEventListener('mouseleave', () => { isHoveringNode = false; });
            
            document.getElementById('labels-container').appendChild(label);
            node.element = label;
        });

        // --- EXPANSION LOGIC ---
        function toggleCardExpansion(index) {
            const card = document.getElementById(`card-${index}`);
            const btn = document.getElementById(`btn-${index}`);
            const logsContainer = document.getElementById(`logs-container-${index}`);
            
            if (card.classList.contains('expanded')) {
                // Collapse
                card.classList.remove('expanded');
                btn.innerHTML = "[ + ]";
                typingState[index].isTyping = false;
            } else {
                // Expand
                card.classList.remove('minimized'); // Force show if it was minimized
                card.classList.add('expanded');
                btn.innerHTML = "[ - ]";
                
                // Clear Previous
                logsContainer.innerHTML = "";
                
                // Reset Typing State
                typingState[index].isTyping = true;
                typingState[index].lineIndex = 0;
                typingState[index].charIndex = 0;
            }
        }

        // --- 3. INFINITE STARFIELD (WITH LENSING) ---
        const starVertexShader = `
            uniform float uTime; uniform float uCameraZ; uniform float uSpeed; 
            uniform vec3 uMassPositions[4]; uniform float uMassStrengths[4];
            uniform vec3 uCameraPos; uniform float uLensing;
            attribute float size; attribute vec3 basePos; varying float vAlpha;
            
            void main() {
                vec3 pos = basePos;
                float wrapDepth = 1000.0;
                float relZ = pos.z - uCameraZ;
                float wrappedZ = mod(relZ + 500.0, wrapDepth) - 500.0;
                pos.z = uCameraZ + wrappedZ;

                vec3 viewDir = normalize(pos - uCameraPos);
                vec3 lensingOffset = vec3(0.0);
                
                for(int i = 0; i < 4; i++) {
                    vec3 massToCam = uMassPositions[i] - uCameraPos;
                    float distToMass = length(massToCam);
                    vec3 massDir = normalize(massToCam);
                    float cosTheta = dot(viewDir, massDir);
                    if (cosTheta > 0.9) { 
                        float angle = acos(clamp(cosTheta, -1.0, 1.0));
                        float thetaE = sqrt(uMassStrengths[i] * uLensing * 0.00002);
                        float deflection = (thetaE * thetaE) / max(angle, 0.005);
                        vec3 perp = normalize(viewDir - massDir * cosTheta);
                        lensingOffset += perp * deflection * distToMass;
                    }
                }

                vec4 mvPosition = viewMatrix * vec4(pos + lensingOffset, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                float dist = length(mvPosition.xyz);
                float sizeFactor = size * (400.0 / dist);
                float twinkle = sin(uTime * 3.0 + basePos.x);
                gl_PointSize = sizeFactor * (1.0 + uSpeed * 0.1 + twinkle * 0.3);
                vAlpha = (0.5 + 0.5 * twinkle) * (1.0 - smoothstep(400.0, 500.0, abs(wrappedZ)));
            }
        `;
        const starFragmentShader = `
            varying float vAlpha;
            void main() {
                vec2 coord = gl_PointCoord - vec2(0.5);
                if(length(coord) > 0.5) discard;
                gl_FragColor = vec4(1.0, 1.0, 1.0, vAlpha * pow(1.0 - length(coord)*2.0, 2.0));
            }
        `;
        const starsGeo = new THREE.BufferGeometry();
        const starPos = []; const starSizes = [];
        for(let i=0; i<CONFIG.starCount; i++) {
            starPos.push((Math.random()-0.5)*800, (Math.random()-0.5)*800, (Math.random()-0.5)*1000);
            starSizes.push(0.5 + Math.random() * 1.5);
        }
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        starsGeo.setAttribute('basePos', new THREE.Float32BufferAttribute(starPos, 3));
        starsGeo.setAttribute('size', new THREE.Float32BufferAttribute(starSizes, 1));
        const starsMat = new THREE.ShaderMaterial({
            uniforms: { 
                uTime: { value: 0 }, uCameraZ: { value: 0 }, uSpeed: { value: 0 },
                uMassPositions: { value: gridMat.uniforms.uMassPositions.value },
                uMassStrengths: { value: gridMat.uniforms.uMassStrengths.value },
                uCameraPos: { value: new THREE.Vector3() },
                uLensing: { value: CONFIG.lensingStrength }
            },
            vertexShader: starVertexShader, fragmentShader: starFragmentShader,
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });
        const starField = new THREE.Points(starsGeo, starsMat);
        starField.frustumCulled = false; scene.add(starField);


        // --- LOGIC ---
        let scrollY = 0; let targetScrollY = 0; let velocity = 0; let properTime = 0; let coordinateTime = 0;

        window.addEventListener('wheel', (e) => {
            const sensitivity = 0.25;
            targetScrollY += e.deltaY * sensitivity; 
            targetScrollY = Math.max(0, Math.min(targetScrollY, 8000));

            // SCROLL-TO-CLOSE FEATURE
            if (Math.abs(e.deltaY) > 5) {
                document.querySelectorAll('.hud-card.expanded').forEach(card => {
                    card.classList.remove('expanded');
                    const index = card.id.split('-')[1];
                    document.getElementById(`btn-${index}`).innerHTML = "[ + ]";
                    typingState[index].isTyping = false;
                });
            }
        });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        
        // --- TYPING LOOP (UPDATED FOR MULTILINE) ---
        setInterval(() => {
            CAREER_NODES.forEach((node, i) => {
                if (typingState[i].isTyping) {
                    const state = typingState[i];
                    
                    // Check if we have more lines to type
                    if (state.lineIndex < node.responsibilities.length) {
                        const currentLineText = node.responsibilities[state.lineIndex];
                        const container = document.getElementById(`logs-container-${i}`);
                        
                        // Check if current line element exists, if not create it
                        let lineEl = document.getElementById(`log-line-${i}-${state.lineIndex}`);
                        if (!lineEl) {
                            lineEl = document.createElement('div');
                            lineEl.className = 'log-line';
                            lineEl.id = `log-line-${i}-${state.lineIndex}`;
                            lineEl.innerHTML = `<span class="log-prefix">>></span><span class="log-content"></span>`;
                            container.appendChild(lineEl);
                        }
                        
                        const contentSpan = lineEl.querySelector('.log-content');
                        
                        // Type next character
                        if (state.charIndex <= currentLineText.length) {
                            contentSpan.innerText = currentLineText.substring(0, state.charIndex) + (state.charIndex < currentLineText.length ? "█" : "");
                            state.charIndex++;
                        } else {
                            // Line finished, move to next
                            contentSpan.innerText = currentLineText; // Remove cursor
                            state.lineIndex++;
                            state.charIndex = 0;
                        }
                    } else {
                        // All lines typed
                        typingState[i].isTyping = false;
                    }
                }
            });
        }, 30); // Faster typing speed

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            const diff = targetScrollY - scrollY;
            scrollY += diff * CONFIG.scrollDamping;
            velocity = diff * CONFIG.scrollDamping;

            const pathProgress = Math.min(Math.max(scrollY / 8000, 0), 1.0);
            const camPos = cameraPath.getPointAt(pathProgress);
            const lookPos = cameraPath.getPointAt(Math.min(pathProgress + 0.02, 1.0)); 
            
            camera.position.copy(camPos);
            camera.position.y += Math.sin(time * 0.5) * 0.5; 
            camera.lookAt(lookPos);
            
            const xTurn = (lookPos.x - camPos.x);
            let targetRoll = -xTurn * 0.8;
            camera.rotation.z = THREE.MathUtils.lerp(camera.rotation.z, Math.max(-0.6, Math.min(0.6, targetRoll)), 0.1);

            starsMat.uniforms.uCameraPos.value.copy(camera.position);
            starsMat.uniforms.uTime.value = time;
            starsMat.uniforms.uCameraZ.value = camera.position.z;
            starsMat.uniforms.uSpeed.value = velocity;
            gridMat.uniforms.uTime = { value: time };
            
            const v_norm = Math.min(Math.abs(velocity) / CONFIG.c_sim, 0.999);
            coordinateTime += delta; properTime += delta / (1.0 / Math.sqrt(1.0 - (v_norm * v_norm)));
            document.getElementById('coord-time').innerText = coordinateTime.toFixed(2);
            document.getElementById('proper-time').innerText = properTime.toFixed(2);
            document.getElementById('velocity').innerText = v_norm.toFixed(2) + "c";
            document.getElementById('lorentz').innerText = (1.0 / Math.sqrt(1.0 - (v_norm * v_norm))).toFixed(3);

            const alert = document.getElementById('velocity-alert');
            if (v_norm > 0.9) { alert.style.display = 'block'; camera.position.x += (Math.random()-0.5)*0.5; } 
            else { alert.style.display = 'none'; }

            // Nodes & HUD
            nodeGroup.children.forEach((wrapper, i) => {
                const node = CAREER_NODES[i];
                wrapper.children[0].scale.setScalar((12 + node.mass * 1.5) + Math.sin(time * 2 + i) * 2);
                
                // --- ANIMATE SKILLS ---
                if (wrapper.children[3]) {
                    wrapper.children[3].rotation.y -= 0.005; 
                    wrapper.children[3].children.forEach((child, cIndex) => {
                        if (cIndex > 0) { 
                            const phase = child.userData.phase || 0;
                            child.position.y = Math.sin(time * 2.0 + phase) * 1.5; 
                            child.children[0].rotation.x += 0.01;
                            child.children[0].rotation.z += 0.005;
                            child.children[1].rotation.x -= 0.02;
                            child.children[1].rotation.y -= 0.03;
                        }
                    });
                }
                
                const nodePos = wrapper.position.clone();
                nodePos.y += 30 + (node.mass * 2); 
                nodePos.project(camera);
                const x = (nodePos.x * .5 + .5) * window.innerWidth;
                const y = -(nodePos.y * .5 - .5) * window.innerHeight;
                
                const el = node.element;
                if(el) {
                    const dist = camera.position.distanceTo(new THREE.Vector3(node.x, 0, node.z));
                    if ((node.z - camera.position.z) > 10) el.style.opacity = 0;
                    else if (dist < 120) {
                        el.querySelector('.hud-card').classList.remove('minimized');
                        el.style.opacity = 1; el.style.zIndex = 100;
                        el.style.transform = `translate(${x}px, ${y}px) scale(1)`;
                    } else if (dist < 400) {
                        const card = el.querySelector('.hud-card');
                        // Only minimize if NOT explicitly expanded
                        if (!card.classList.contains('expanded')) {
                            card.classList.add('minimized');
                        }
                        
                        el.style.opacity = Math.max(0.2, 1.0 - ((dist - 120) / 280));
                        el.style.zIndex = 50; el.style.transform = `translate(${x}px, ${y}px) scale(0.8)`;
                    } else el.style.opacity = 0;

                    if (node.x < 0) {
                        el.style.flexDirection = "row-reverse";
                        el.children[1].style.background = "linear-gradient(-90deg, #0ff, transparent)";
                    } else {
                        el.style.flexDirection = "row";
                        el.children[1].style.background = "linear-gradient(90deg, #0ff, transparent)";
                    }
                }
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
