<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Path Integral Lattice Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 20px; left: 20px; color: #fff;
            font-family: 'Courier New', Courier, monospace; pointer-events: none;
        }
        h1 { font-size: 1.2rem; margin: 0 0 10px 0; letter-spacing: 1px; color: #00ffff;}
        p { font-size: 0.9rem; margin: 5px 0; color: #aaa; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>FEYNMAN PATH INTEGRAL</h1>
        <p>Start State: Origin (0,0,0)</p>
        <p>End State: Mouse Cursor</p>
        <p>Color map: Quantum Phase (S / ħ)</p>
        <p>Brightness: Proximity to Classical Action (δS = 0)</p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.002);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, -50, 80);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. Physics & Lattice Parameters
        const NUM_PATHS = 200;    // Number of histories to sum over
        const NUM_SLICES = 40;    // Time slices N (spatial lattice nodes per path)
        const H_BAR = 1.5;        // Scaled Planck constant for visual phase wrapping
        const MASS = 1.0;         // Particle mass
        const EPSILON = 0.1;      // Time step delta t
        
        const paths = [];         // Array to hold Line objects
        const fluctuations = [];  // Array to hold randomized offsets

        const origin = new THREE.Vector3(0, 0, 0);
        let target = new THREE.Vector3(0, 50, 0); // Initial target

        // 3. Initialize Paths
        const materialConfig = {
            linewidth: 2,
            transparent: true,
            blending: THREE.AdditiveBlending,
            vertexColors: true // Allow per-vertex coloring based on Action
        };

        for (let i = 0; i < NUM_PATHS; i++) {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(NUM_SLICES * 3);
            const colors = new Float32Array(NUM_SLICES * 3);
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const line = new THREE.Line(geometry, new THREE.LineBasicMaterial(materialConfig));
            scene.add(line);
            paths.push(line);

            // Generate intrinsic quantum fluctuations for this path
            const fluc = [];
            for(let j = 0; j < NUM_SLICES; j++) {
                // Envelope function so start and end points remain fixed (0 fluctuation)
                const envelope = Math.sin((j / (NUM_SLICES - 1)) * Math.PI);
                fluc.push(new THREE.Vector3(
                    (Math.random() - 0.5) * 30 * envelope,
                    (Math.random() - 0.5) * 30 * envelope,
                    (Math.random() - 0.5) * 30 * envelope
                ));
            }
            fluctuations.push(fluc);
        }

        // 4. Raycaster for Mouse Perturbation
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); // Z=0 plane
        
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(plane, target);
        });

        // 5. Animation Loop & Action Calculation
        const colorHelper = new THREE.Color();
        
        function animate(time) {
            requestAnimationFrame(animate);

            // Gently rotate camera for 3D feel
            camera.position.x = Math.sin(time * 0.0002) * 80;
            camera.position.z = Math.cos(time * 0.0002) * 80;
            camera.lookAt(0, 20, 0);

            for (let i = 0; i < NUM_PATHS; i++) {
                const positions = paths[i].geometry.attributes.position.array;
                const colors = paths[i].geometry.attributes.color.array;
                
                let actionS = 0;

                for (let j = 0; j < NUM_SLICES; j++) {
                    const t_ratio = j / (NUM_SLICES - 1);
                    
                    // Classical Trajectory (Straight line)
                    const classX = origin.x + t_ratio * (target.x - origin.x);
                    const classY = origin.y + t_ratio * (target.y - origin.y);
                    const classZ = origin.z + t_ratio * (target.z - origin.z);

                    // Add dynamic fluctuation (time-dependent wave to simulate field oscillation)
                    const wave = Math.sin(time * 0.002 + i + j * 0.2);
                    
                    // Current Lattice Node position
                    const nodeX = classX + fluctuations[i][j].x * wave;
                    const nodeY = classY + fluctuations[i][j].y * wave;
                    const nodeZ = classZ + fluctuations[i][j].z * wave;

                    positions[j * 3] = nodeX;
                    positions[j * 3 + 1] = nodeY;
                    positions[j * 3 + 2] = nodeZ;

                    // Calculate Action S = sum( 0.5 * m * v^2 - V )
                    if (j > 0) {
                        const dx = nodeX - positions[(j-1)*3];
                        const dy = nodeY - positions[(j-1)*3 + 1];
                        const dz = nodeZ - positions[(j-1)*3 + 2];
                        const velocitySq = (dx*dx + dy*dy + dz*dz) / (EPSILON * EPSILON);
                        
                        // Kinetic energy term
                        const KE = 0.5 * MASS * velocitySq;
                        
                        // The mouse acts as a localized potential well V(r)
                        const distToMouse = Math.sqrt(
                            Math.pow(nodeX - target.x, 2) + 
                            Math.pow(nodeY - target.y, 2)
                        );
                        // Potential gets negative near the mouse
                        const V = -100.0 / (distToMouse + 1.0); 

                        const lagrangian = KE - V;
                        actionS += lagrangian * EPSILON;
                    }

                    // Map Action S to Quantum Phase e^(iS/h)
                    const phase = actionS / H_BAR;
                    
                    // Stationary phase mapping: Paths close to classical action have less variance
                    // We map phase variance to brightness (constructive interference)
                    const classicalActionApprox = Math.pow(target.distanceTo(origin), 2) / (2 * EPSILON * NUM_SLICES);
                    const actionDiff = Math.abs(actionS - classicalActionApprox);
                    
                    // Hue is determined by phase. Brightness determined by proximity to stationary action
                    const hue = (phase % (2 * Math.PI)) / (2 * Math.PI);
                    const lightness = Math.max(0.1, 0.8 * Math.exp(-actionDiff * 0.005));

                    colorHelper.setHSL(hue, 1.0, lightness);
                    
                    colors[j * 3] = colorHelper.r;
                    colors[j * 3 + 1] = colorHelper.g;
                    colors[j * 3 + 2] = colorHelper.b;
                }
                
                paths[i].geometry.attributes.position.needsUpdate = true;
                paths[i].geometry.attributes.color.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }
        
        animate(0);

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
