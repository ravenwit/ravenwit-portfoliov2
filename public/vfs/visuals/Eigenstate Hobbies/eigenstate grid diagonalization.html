<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Portfolio: Floating Grid</title>
    <style>
        :root {
            --bg: #030303;
            --text: #e0e0e0;
            --window-bg: rgba(15, 15, 15, 0.85);
            --border: rgba(255, 255, 255, 0.1);
            
            /* Category Colors */
            --c-phys: #d946ef;
            --c-math: #f59e0b;
            --c-ai: #f97316;
            --c-sec: #10b981;
            --c-dev: #06b6d4;
            --c-tool: #94a3b8;
            --c-art: #f43f5e;
        }

        body {
            margin: 0;
            background: var(--bg);
            /* Optional: Subtle grid background for depth */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text);
            font-family: 'Segoe UI', 'Roboto Mono', monospace;
            overflow-x: hidden;
            height: 1500vh; /* Scroll depth */
        }

        /* --- LAYOUT WRAPPER --- */
        #viewport-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; /* Let scroll pass through to body */
            z-index: 10;
        }

        /* --- THE FLOATING WINDOW --- */
        #floating-table {
            pointer-events: auto;
            width: 95%;
            max-width: 900px;
            background: var(--window-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            transition: height 0.3s;
        }

        /* --- HEADER SECTION --- */
        #header-row {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;
        }

        #year-display {
            font-size: 2.5rem; font-weight: 200; letter-spacing: -1px;
            font-variant-numeric: tabular-nums; line-height: 1;
            color: #fff;
        }
        
        #instruction { 
            font-size: 0.65rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; 
            margin-bottom: 4px;
        }

        /* Timeline Progress Bar */
        #timeline-track {
            width: 100%; height: 2px; background: #333; position: relative;
            margin-top: -2px;
        }
        #timeline-thumb {
            width: 40px; height: 2px; background: #fff; position: absolute; top: 0;
            box-shadow: 0 0 10px #fff; transition: left 0.1s linear;
        }

        /* --- GRID CONTENT --- */
        #grid-container {
            display: flex;
            align-items: flex-start;
            /* Flexing logic to fill space */
            justify-content: flex-start; 
            min-height: 200px; /* Ensure visual stability */
        }

        .col {
            display: flex; flex-direction: column;
            flex: 1; /* Grow to fill space */
            min-width: 110px; /* Minimum readable width */
            margin-right: 12px;
            border-left: 1px dashed rgba(255,255,255,0.08);
            padding-left: 10px;
            
            /* Collapse Animation */
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            overflow: hidden;
            max-width: 200px;
        }
        
        .col:last-child { margin-right: 0; }

        .col.collapsed {
            flex: 0;
            min-width: 0;
            max-width: 0;
            margin-right: 0;
            padding-left: 0;
            border: none;
            opacity: 0;
        }
        
        .col-header {
            font-size: 0.5rem; color: #777; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap;
        }

        /* --- ITEM ROW --- */
        .item-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 6px;
            padding: 4px 6px;
            font-size: 0.7rem;
            position: relative;
            white-space: nowrap;
            border-radius: 4px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
        }

        .icon-box {
            width: 14px; height: 14px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        
        .icon-box svg {
            width: 100%; height: 100%;
            fill: none; stroke: currentColor; stroke-width: 1.5;
            stroke-linecap: round; stroke-linejoin: round;
        }

        .label {
            opacity: 0.8; font-weight: 400; letter-spacing: 0.2px;
        }

        /* --- ANIMATIONS --- */
        .spawn { animation: popIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Permanent Item */
        .stable { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); }
        .stable .label { color: #fff; opacity: 1; font-weight: 600; }
        .stable .icon-box { filter: drop-shadow(0 0 3px currentColor); }

        /* Temporary Item Glitch */
        .unstable { animation: static-buzz 3s infinite; }
        @keyframes static-buzz {
            0% { transform: translate(0, 0); }
            96% { transform: translate(0.5px, 0.5px); }
            98% { transform: translate(-0.5px, -0.5px); }
            100% { transform: translate(0, 0); }
        }

        /* Death */
        .die { animation: glitch-out 0.2s forwards !important; color: #ff4444 !important; background: rgba(255,0,0,0.1); }
        @keyframes glitch-out {
            0% { clip-path: inset(0 0 0 0); transform: translate(0); }
            20% { clip-path: inset(20% 0 20% 0); transform: translate(-2px, 1px); }
            100% { opacity: 0; transform: scale(0.8); clip-path: inset(50% 0 50% 0); }
        }

        /* Colors */
        .cat-physics { color: var(--c-phys); }
        .cat-math { color: var(--c-math); }
        .cat-ai_data { color: var(--c-ai); }
        .cat-security { color: var(--c-sec); }
        .cat-dev { color: var(--c-dev); }
        .cat-tools { color: var(--c-tool); }
        .cat-arts { color: var(--c-art); }

    </style>
</head>

            { cat: "ai_data", name: "Neural Networks", start: 2020, end: "Present" },
            { cat: "ai_data", name: "TensorFlow", start: 2020, end: "Present" },
            { cat: "ai_data", name: "Keras", start: 2020, end: "Present" },
            { cat: "physics", name: "AdS/CFT", start: 2021, end: "Present" },
            { cat: "physics", name: "Holographic Principle", start: 2021, end: "Present" },
            { cat: "physics", name: "Gravitational Waves", start: 2021, end: "Present" },
            { cat: "dev", name: "Node.js", start: 2022, end: 2023 },
            { cat: "arts", name: "Kalimba", start: 2023, end: "Present" },
            { cat: "physics", name: "Renormalization", start: 2024, end: "Present" },
            { cat: "physics", name: "Quantum Error Correction", start: 2025, end: "Present" }
        ];

        const MIN_YEAR = 2004;
        const MAX_YEAR = 2027;
        const CATEGORIES = ["physics", "math", "ai_data", "security", "dev", "tools", "arts"];
        const GRID = document.getElementById('grid-container');
        
        // Init Columns
        let cols = {};
        CATEGORIES.forEach(cat => {
            const c = document.createElement('div');
            c.className = `col cat-${cat}`;
            c.innerHTML = `<div class="col-header">${cat.replace('_', ' ')}</div>`;
            GRID.appendChild(c);
            cols[cat] = c;
        });

        function update(progress) {
            const year = Math.floor(MIN_YEAR + (progress * (MAX_YEAR - MIN_YEAR)));
            document.getElementById('year-display').innerText = year;
            document.getElementById('timeline-thumb').style.left = (progress * 100) + '%';

            // Update Items
            DATA.forEach(item => {
                const end = item.end === "Present" ? 9999 : parseInt(item.end);
                const isActive = year >= parseInt(item.start) && year <= end;
                // Safe ID generation
                const safeId = 'card-' + btoa(item.name).replace(/=/g, '');
                
                let card = document.getElementById(safeId);

                if(isActive && !card) {
                    card = document.createElement('div');
                    card.id = safeId;
                    card.className = 'item-row spawn cat-' + item.cat;
                    
                    if(item.end === "Present") card.classList.add('stable');
                    else card.classList.add('unstable');
                    
                    const iconBox = document.createElement('div');
                    iconBox.className = 'icon-box';
                    iconBox.style.color = `var(--c-${item.cat === 'ai_data' ? 'ai' : item.cat})`;
                    iconBox.innerHTML = getIcon(item.name, item.cat);

                    const label = document.createElement('div');
                    label.className = 'label';
                    label.innerText = item.name;

                    card.appendChild(iconBox);
                    card.appendChild(label);
                    cols[item.cat].appendChild(card);
                } 
                else if(!isActive && card) {
                    if(year < parseInt(item.start)) {
                        card.remove();
                    } else if (!card.classList.contains('die')) {
                        card.classList.add('die');
                        setTimeout(() => { if(card.parentNode) card.parentNode.removeChild(card); }, 300);
                    }
                }
            });

            // Update Column Visibility
            CATEGORIES.forEach(cat => {
                const col = cols[cat];
                // Check if any items exist (including dying ones to prevent jumping)
                const hasItems = col.children.length > 1; // 1 because header is child 0
                if(hasItems) col.classList.remove('collapsed');
                else col.classList.add('collapsed');
            });
        }

        window.addEventListener('scroll', () => {
            const max = document.body.scrollHeight - window.innerHeight;
            const p = Math.max(0, Math.min(1, window.scrollY / max));
            update(p);
        });

        update(0);

    </script>
</body>
</html>
