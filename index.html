<!DOCTYPE html>
<html lang="en">

<head>

    <!-- <a href="https://iconscout.com/icons/cv" class="text-underline font-size-sm" target="_blank">Cv</a> by <a href="https://iconscout.com/contributors/kiran-shastry" class="text-underline font-size-sm" target="_blank">Kiran Shastry</a> -->
    <!-- <a href="https://iconscout.com/icons/resume" class="text-underline font-size-sm" target="_blank">resume</a> by <a href="https://iconscout.com/contributors/iconmarketpk" class="text-underline font-size-sm" target="_blank">IconMarket</a> -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakir Ahmed (Ravenwit)</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Portfolio of Shakir Ahmed (Ravenwit).">
    <meta name="keywords" content="Shakir Ahmed, Ravenwit">
    <meta name="author" content="Shakir Ahmed">

    <!-- Open Graph / LinkedIn / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ravenwit.github.io/">
    <meta property="og:title" content="Shakir Ahmed (Ravenwit) | Portfolio">
    <meta property="og:description" content="Interactive Spacetime Portfolio.">
    <meta property="og:image" content="https://ravenwit.github.io/og-image.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://ravenwit.github.io/">
    <meta name="twitter:title" content="Shakir Ahmed (Ravenwit) | Portfolio">
    <meta name="twitter:description" content="Interactive Spacetime Portfolio.">
    <meta name="twitter:image" content="https://ravenwit.github.io/og-image.png">

    <!-- Favicons (Placeholders, add actual files to /public) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="canonical" href="https://ravenwit.github.io/" />

    <!-- Resource Hints: Preload critical CSS -->
    <link rel="preload" href="/src/styles/main.css" as="style">
    <script>
        // Mobile fallback mechanism: redirect to previous portfolio on small screens dynamically
        function checkMobileFallback() {
            if (window.innerWidth <= 768 && !window.location.pathname.startsWith('/mobile/')) {
                window.location.replace('/mobile/index.html');
            }
        }

        // Check on load
        checkMobileFallback();
        // Check on resize
        window.addEventListener('resize', checkMobileFallback);
    </script>
    <link rel="stylesheet" href="/src/styles/main.css">
    <!-- Jersey 10 Charted Google Font for industrial aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10+Charted&display=swap" rel="stylesheet">
    <!-- Micro 5 Charted Google Font for industrial aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Micro+5+Charted&display=swap" rel="stylesheet">
    <!-- Sixtyfour Google Font for industrial aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Micro+5+Charted&family=Sixtyfour&display=swap"
        rel="stylesheet">
    <!-- Doto Google Font for industrial aesthetic -->
    <link
        href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Micro+5+Charted&family=Sixtyfour&display=swap"
        rel="stylesheet">
    <!-- Fonts for the Research Phase Dimension -->
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>

    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div id="optical-flash"></div>

    <div id="canvas-container"></div>
    <div id="labels-container"></div>

    <div id="hobbies-ui-layer" class="ui-layer">
        <!-- Timeline Badge -->
        <div id="timeline-badge">
            <span class="badge-title">Timeline</span>
            <span class="badge-subtitle">▸ SCROLL TO TRAVERSE</span>
        </div>
        <div id="hobbies-viewport">
            <div id="triptych-container">
                <div id="triptych">
                    <div class="triptych-master-title">INTERESTS / TOYS</div>
                    <div class="matrix-wrapper" id="wrapper-areas">
                        <div class="bracket left"></div>
                        <div class="bracket right"></div>
                        <div id="matrix-areas" class="matrix matrix-6x6"></div>
                    </div>
                    <div class="matrix-wrapper" id="wrapper-categories">
                        <div class="bracket left" style="border-width: 3px;"></div>
                        <div class="bracket right" style="border-width: 3px;"></div>
                        <div id="matrix-categories" class="matrix matrix-7x7"></div>
                    </div>
                    <div class="matrix-wrapper" id="wrapper-tools">
                        <div class="bracket left"></div>
                        <div class="bracket right"></div>
                        <div id="matrix-tools" class="matrix matrix-6x6"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <div id="ui-hero" class="ui-layer">
        <div id="liquid-name-container"
            style="position: absolute; width: clamp(300px, 40vw, 600px); height: clamp(72px, 9.6vw, 144px); top: 22vh; left: 50%; transform: translate(-50%, -50%); z-index: 6; pointer-events: auto; cursor: crosshair;">
            <canvas id="liquidNameCanvas" width="500" height="120"
                style="width:100%; height:100%; pointer-events: auto;" aria-label="Interactive liquid name animation"
                role="img"></canvas>
        </div>
        <div id="fourier-container"
            style="position: absolute; width: clamp(300px, 45vh, 700px); height: clamp(300px, 45vh, 700px); top: 50vh; left: 50%; transform: translate(-50%, -50%); z-index: 5;">
            <canvas id="fourierCanvas" width="600" height="600" style="width:100%; height:100%; border-radius: 50%;"
                aria-label="Fourier series orbital animation" role="img"></canvas>
        </div>



        <!-- Scroll Beacon -->
        <div class="scroll-beacon">
            <span class="scroll-beacon-text">SCROLL TO ENTER TIMELINE</span>
            <div class="scroll-chevrons">
                <span class="chevron"></span>
                <span class="chevron"></span>
                <span class="chevron"></span>
            </div>
        </div>
    </div>

    <div id="hud">
        <div class="telemetry-grid">
            <div class="telemetry-cell">
                <span class="telemetry-label">YEAR</span>
                <span id="current-year" class="telemetry-value">2025</span>
            </div>
            <div class="telemetry-cell">
                <span class="telemetry-label">t</span>
                <span id="coord-time" class="telemetry-value">0.00</span>
            </div>
            <div class="telemetry-cell" style="border-right: none;">
                <span class="telemetry-label">&tau;</span>
                <span id="proper-time" class="telemetry-value">0.00</span>
            </div>
            <div class="speedo-container">
                <div class="speedometer-arc"></div>
                <div id="speedo-needle" class="needle"></div>
            </div>
        </div>

        <div class="telemetry-footer">
            <span id="velocity-alert" class="velocity-warning">CAUSALITY BREAK IMMINENT</span>
        </div>
    </div>


    <!-- RESEARCH PHASE UI -->
    <div id="ui-research" class="ui-layer" style="display: none; opacity: 0;">
        <div id="noise-overlay"></div>
        <canvas id="research-bg-canvas" aria-label="Research phase background animation" role="img"></canvas>
        <div id="left-hemi"></div>
        <div id="right-hemi">
            <div id="research-cards-container"></div>
        </div>
        <div id="research-hud-overlay">
            <div class="stat-col"><span class="stat-label">TOPOLOGY PHASE</span><span id="hud-phase"
                    class="stat-value hud-accent">INITIALIZING</span></div>
            <div class="stat-col"><span class="stat-label">S-COORDINATE</span><span id="hud-s"
                    class="stat-value">0.00</span></div>
            <div class="stat-col"><span class="stat-label">PARTICLE Ω</span><span id="hud-omega" class="stat-value">0.00
                    rad/s</span></div>
        </div>
    </div>

    <!-- AUDIO SOUND TOGGLE -->
    <button id="audio-toggle" class="audio-toggle-btn" aria-label="Toggle Sound">
        <!-- OFF ICON -->
        <svg id="icon-sound-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
        <!-- ON ICON -->
        <svg id="icon-sound-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <span class="audio-tooltip">SOUND: OFF</span>
    </button>

    <!-- TERMINAL OVERLAY UI -->
    <div id="terminal-overlay" class="terminal-hidden">
        <div class="terminal-crt-overlay"></div>
        <div class="terminal-scanlines"></div>
        <div class="terminal-container">
            <div id="terminal-history"></div>
            <div class="terminal-input-row">
                <span id="terminal-prompt" class="terminal-prompt">[user@raven ~]$</span>
                <input type="text" id="terminal-input" class="terminal-input" autocomplete="off" spellcheck="false"
                    aria-labelledby="terminal-prompt" />
                <span class="terminal-cursor"></span>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
