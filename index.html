<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacetime Portfolio | Organic Transition</title>
    <link rel="stylesheet" href="/src/styles/main.css">
    <!-- Jersey 10 Charted Google Font for industrial aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10+Charted&display=swap" rel="stylesheet">
    <!-- Micro 5 Charted Google Font for industrial aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Micro+5+Charted&display=swap" rel="stylesheet">
    <!-- Sixtyfour Google Font for industrial aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Micro+5+Charted&family=Sixtyfour&display=swap"
        rel="stylesheet">
    <!-- Doto Google Font for industrial aesthetic -->
    <link
        href="https://fonts.googleapis.com/css2?family=Doto:wght@100..900&family=Micro+5+Charted&family=Sixtyfour&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div id="optical-flash"></div>

    <div id="canvas-container"></div>
    <div id="labels-container"></div>

    <div id="hobbies-ui-layer" class="ui-layer">
        <div id="hobbies-viewport">
            <div id="triptych-container">
                <div id="triptych">
                    <div class="triptych-master-title">INTERESTS / TOYS</div>
                    <div class="matrix-wrapper" id="wrapper-areas">
                        <div class="bracket left"></div>
                        <div class="bracket right"></div>
                        <div id="matrix-areas" class="matrix matrix-6x6"></div>
                    </div>
                    <div class="matrix-wrapper" id="wrapper-categories">
                        <div class="bracket left" style="border-width: 3px;"></div>
                        <div class="bracket right" style="border-width: 3px;"></div>
                        <div id="matrix-categories" class="matrix matrix-7x7"></div>
                    </div>
                    <div class="matrix-wrapper" id="wrapper-tools">
                        <div class="bracket left"></div>
                        <div class="bracket right"></div>
                        <div id="matrix-tools" class="matrix matrix-6x6"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="ui-loader" class="ui-layer">
        <div class="loader-content">
            <h1 class="loader-title">System Initialization</h1>
            <div class="loader-bar-track">
                <div id="progress-bar" class="loader-bar-fill"></div>
            </div>
            <div class="data-readout">
                <div>k_B T (Temp): <span id="temp-display">50.000</span></div>
                <div>Ω (Order): <span id="order-display">0.000</span></div>
                <div>Status: <span id="status-display">ENTROPY_MAXIMIZED</span></div>
            </div>
        </div>
    </div>

    <div id="ui-hero" class="ui-layer">
        <div id="fourier-container"
            style="position: absolute; width: 600px; height: 600px; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5;">
            <canvas id="fourierCanvas" width="600" height="600"
                style="width:100%; height:100%; border-radius: 50%;"></canvas>
        </div>
        <div class="scroll-icon-container">
            <div class="mouse-icon">
                <div class="wheel"></div>
            </div>
        </div>
    </div>

    <div id="hud">
        <div class="metric-row"><span class="metric-label">CURRENT YEAR (y)</span> <span id="current-year"
                class="metric-value">2025</span></div>
        <div class="metric-row"><span class="metric-label">COORD. TIME (t)</span> <span id="coord-time"
                class="metric-value">0.00</span></div>
        <div class="metric-row"><span class="metric-label">PROPER TIME (&tau;)</span> <span id="proper-time"
                class="metric-value">0.00</span></div>
        <div class="metric-row"><span class="metric-label">VELOCITY (v)</span> <span id="velocity"
                class="metric-value">0.00c</span></div>
        <div class="metric-row"><span class="metric-label">LORENTZ (&gamma;)</span> <span id="lorentz"
                class="metric-value">1.000</span></div>
        <div style="margin-top:10px; font-size: 10px; opacity: 0.7; color: #0ff;">SYSTEM: OPTICAL LENSING ACTIVE
        </div>
        <div id="velocity-alert" class="velocity-warning">CAUSALITY BREAK IMMINENT</div>
    </div>

    <!-- QUANTUM SOCIAL LINKS -->
    <div id="quantum-world-line">
        <div class="trajectory-line"></div>
        <!-- 5 Quanta Nodes hovering on the string -->
        <a href="#" target="_blank" class="quanta-node" style="top: 20%;">
            <div class="node-core"></div>
            <div class="node-label-container"><span class="node-label"></span></div>
        </a>
        <a href="#" target="_blank" class="quanta-node" style="top: 40%;">
            <div class="node-core"></div>
            <div class="node-label-container"><span class="node-label"></span></div>
        </a>
        <a href="#" target="_blank" class="quanta-node" style="top: 60%;">
            <div class="node-core"></div>
            <div class="node-label-container"><span class="node-label"></span></div>
        </a>
        <a href="#" target="_blank" class="quanta-node" style="top: 80%;">
            <div class="node-core"></div>
            <div class="node-label-container"><span class="node-label"></span></div>
        </a>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
