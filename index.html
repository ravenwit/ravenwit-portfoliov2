    <div id="hobbies-ui-layer" class="ui-layer">

                    <div class="triptych-master-title">INTERESTS / TOYS</div>

                        <div class="bracket right"></div>
                        <div id="matrix-areas" class="matrix matrix-6x6"></div>
                    </div>
                    <div class="matrix-wrapper" id="wrapper-categories">
                        <div class="bracket left" style="border-width: 3px;"></div>
                        <div class="bracket right" style="border-width: 3px;"></div>
                        <div id="matrix-categories" class="matrix matrix-7x7"></div>
                    </div>
                    <div class="matrix-wrapper" id="wrapper-tools">
                        <div class="bracket left"></div>
                        <div class="bracket right"></div>
                        <div id="matrix-tools" class="matrix matrix-6x6"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

            style="position: absolute; width: 500px; height: 120px; top: calc(50% - 170px); left: 50%; transform: translate(-50%, -50%); z-index: 6; pointer-events: auto; cursor: crosshair;">
            <canvas id="liquidNameCanvas" width="500" height="120"
                style="width:100%; height:100%; pointer-events: auto;"></canvas>
        </div>
        <div id="fourier-container"
            style="position: absolute; width: 600px; height: 600px; top: calc(50% + 30px);; left: 50%; transform: translate(-50%, -50%); z-index: 5;">
            <canvas id="fourierCanvas" width="600" height="600"
                style="width:100%; height:100%; border-radius: 50%;"></canvas>
        </div>

        <div class="scroll-icon-container">
            <div class="mouse-icon">
                <div class="wheel"></div>
            </div>
        </div>
    </div>

    <div id="hud">
        <div class="telemetry-grid">
            <div class="telemetry-cell">
                <span class="telemetry-label">YEAR</span>
                <span id="current-year" class="telemetry-value">2025</span>
            </div>
            <div class="telemetry-cell">
                <span class="telemetry-label">t</span>
                <span id="coord-time" class="telemetry-value">0.00</span>
            </div>
            <div class="telemetry-cell" style="border-right: none;">
                <span class="telemetry-label">&tau;</span>
                <span id="proper-time" class="telemetry-value">0.00</span>
            </div>
            <div class="speedo-container">
                <div class="speedometer-arc"></div>
                <div id="speedo-needle" class="needle"></div>
            </div>
        </div>

        <div class="telemetry-footer">
            <span id="velocity-alert" class="velocity-warning">CAUSALITY BREAK IMMINENT</span>
        </div>
    </div>

    <!-- QUANTUM SOCIAL LINKS -->
    <div id="quantum-world-line">
        <div class="trajectory-line"></div>
        <!-- 5 Quanta Nodes hovering on the string -->
        <a href="#" target="_blank" class="quanta-node" style="top: 20%;">
            <div class="node-core"></div>
            <div class="node-label-container"><span class="node-label"></span></div>
        </a>
        <a href="#" target="_blank" class="quanta-node" style="top: 40%;">
            <div class="node-core"></div>
            <div class="node-label-container"><span class="node-label"></span></div>
        </a>
        <a href="#" target="_blank" class="quanta-node" style="top: 60%;">
            <div class="node-core"></div>
            <div class="node-label-container"><span class="node-label"></span></div>
        </a>
        <a href="#" target="_blank" class="quanta-node" style="top: 80%;">
            <div class="node-core"></div>
            <div class="node-label-container"><span class="node-label"></span></div>
        </a>
    </div>
    <!-- RESEARCH PHASE UI -->
    <div id="ui-research" class="ui-layer" style="display: none; opacity: 0;">
        <div id="noise-overlay"></div>
        <canvas id="research-bg-canvas"></canvas>
        <div id="left-hemi"></div>
        <div id="right-hemi">
            <div id="research-cards-container"></div>
        </div>
        <div id="research-hud-overlay">
            <div class="stat-col"><span class="stat-label">TOPOLOGY PHASE</span><span id="hud-phase"
                    class="stat-value hud-accent">INITIALIZING</span></div>
            <div class="stat-col"><span class="stat-label">S-COORDINATE</span><span id="hud-s"
                    class="stat-value">0.00</span></div>
            <div class="stat-col"><span class="stat-label">PARTICLE Ω</span><span id="hud-omega" class="stat-value">0.00
                    rad/s</span></div>
        </div>
    </div>

    <!-- TERMINAL OVERLAY UI -->
    <div id="terminal-overlay" class="terminal-hidden">
        <div class="terminal-crt-overlay"></div>
        <div class="terminal-scanlines"></div>
        <div class="terminal-container">
            <div id="terminal-history"></div>
            <div class="terminal-input-row">
                <span id="terminal-prompt" class="terminal-prompt">[user@raven ~]$</span>
                <input type="text" id="terminal-input" class="terminal-input" autocomplete="off" spellcheck="false"
                    autofocus />
                <span class="terminal-cursor"></span>
            </div>
        </div>
    </div>
